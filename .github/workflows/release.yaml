name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: arm64
          - os: darwin
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o bpfvet-${{ matrix.os }}-${{ matrix.arch }} ./cmd/bpfvet

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bpfvet-${{ matrix.os }}-${{ matrix.arch }}
          path: bpfvet-${{ matrix.os }}-${{ matrix.arch }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          for dir in artifacts/bpfvet-*/; do
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              name=$(basename "$file")
              cp "$file" "release/$name"
              chmod +x "release/$name"
              sha256sum "release/$name" >> release/checksums.txt
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/bpfvet-linux-amd64
            release/bpfvet-linux-arm64
            release/bpfvet-darwin-amd64
            release/bpfvet-darwin-arm64
            release/checksums.txt
